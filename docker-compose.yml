# =====================================================
# celx-atendimento - Docker Compose (Production)
# PostgreSQL + PgAdmin + Redis + Backend + Frontend + Celery
# =====================================================

services:
  # =====================================================
  # POSTGRESQL
  # =====================================================
  postgres:
    image: postgres:16-alpine
    container_name: celx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: celx_atendimento
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-celx123456}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - celx-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d celx_atendimento"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =====================================================
  # PGADMIN (Admin do PostgreSQL)
  # =====================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: celx-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@celx.com.br}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-celx123456}
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./database/servers.json:/pgadmin4/servers.json:ro
    networks:
      - celx-network
    depends_on:
      postgres:
        condition: service_healthy

  # =====================================================
  # REDIS (para Celery/Background Tasks)
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: celx-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - celx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # =====================================================
  # BACKEND (FastAPI)
  # =====================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-celx123456}
    container_name: celx-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-celx123456}@postgres:5432/celx_atendimento
      SYNC_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-celx123456}@postgres:5432/celx_atendimento
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-sua-chave-secreta-muito-longa-aqui-123456789abcdefghijk}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-sua-chave-32-bytes-aqui12345}
      OPENROUTER_API_URL: https://openrouter.ai/api/v1
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - celx-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # =====================================================
  # CELERY (Background Tasks / AI Processing)
  # =====================================================
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-celx123456}
    container_name: celx-celery
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-celx123456}@postgres:5432/celx_atendimento
      SYNC_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-celx123456}@postgres:5432/celx_atendimento
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-sua-chave-secreta-muito-longa-aqui-123456789abcdefghijk}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-sua-chave-32-bytes-aqui12345}
      OPENROUTER_API_URL: https://openrouter.ai/api/v1
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - uploads_data:/app/uploads
    networks:
      - celx-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # =====================================================
  # FRONTEND (Next.js)
  # =====================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: celx-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - celx-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

# =====================================================
# REDES
# =====================================================
networks:
  celx-network:
    driver: bridge

# =====================================================
# VOLUMES
# =====================================================
volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  uploads_data: